description: "Needle in a Haystack — Test de position mémoire LLM"

prompts:
  - id: needle_prompt
    raw: |
      Voici une liste de données confidentielles :
      {{context}}

      Question : Quel est l'ID associé à l'élément '{{target_item}}' ?
      Réponds uniquement par l'ID exact, sans explication ni ponctuation.

providers:
  # Provider openai = compatible avec toute API locale (Ollama, LM Studio, vLLM…)
  # Lit OPENAI_BASE_URL et OPENAI_API_KEY depuis l'environnement du container (docker-compose.yml)
  # Modèle dans l'ID (plus fiable que config.model pour la résolution de variables)
  - id: "openai:chat:{{env.LLM_MODEL}}"
    config:
      temperature: 0
      max_tokens: 2000

# Rate limiting : ajuste ces deux valeurs si tu obtiens des erreurs 429
#   maxConcurrency : nombre de requêtes en parallèle (1 = séquentiel, recommandé pour les API cloud)
#   delay          : pause en ms entre chaque requête (ex: 3000 = 3 s → ~20 req/min, safe pour Groq free tier)
evaluateOptions:
  maxConcurrency: 1
  delay: 3000

# Généré par generate_tests.py (seed fixe = reproductible)
tests: tests.yaml
